<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>Just Do — Design</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    html, body { margin: 0; padding: 0; background: #f0eee9; }
    * { box-sizing: border-box; }
    @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
    /* hide scrollbars inside artboards */
    .dc-card *::-webkit-scrollbar { display: none; }
    .dc-card * { scrollbar-width: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="styles/tokens.jsx"></script>
  <script type="text/babel" src="styles/primitives.jsx"></script>
  <script type="text/babel" src="screens/home.jsx"></script>
  <script type="text/babel" src="screens/bottom-sheet.jsx"></script>
  <script type="text/babel" src="screens/detail.jsx"></script>
  <script type="text/babel" src="screens/stats.jsx"></script>
  <script type="text/babel" src="screens/settings.jsx"></script>
  <script type="text/babel" src="screens/widgets.jsx"></script>

  <script type="text/babel">
    function App() {
      const P = 390, H = 844; // iPhone 15 Pro
      return (
        <DesignCanvas>
          <DCSection id="intro" title="Just Do" subtitle="iOS + 웹 To-Do 앱 · 할일과 일정을 하나의 Task로 · Apple SD Gothic Neo · muted 파스텔 팔레트">
            <DCArtboard id="about" label="디자인 노트" width={540} height={H} style={{ background: '#F6F4EF', padding: 32 }}>
              <div style={{ fontFamily: JD_DISPLAY, color: '#1C1A17' }}>
                <div style={{ fontSize: 34, fontWeight: 700, letterSpacing: -1, lineHeight: 1.1, marginBottom: 6 }}>Just Do</div>
                <div style={{ fontSize: 14, color: 'rgba(28,26,23,0.58)', marginBottom: 28, lineHeight: 1.5 }}>
                  할일과 일정을 하나의 Task로. 캘린더 뷰 중심의 iOS + 웹 To-Do.
                </div>

                <Note title="컨셉">
                  캘린더와 투두를 분리하지 않고, <b>Task</b>라는 하나의 단위로 통합. 기간 있는 작업은 캘린더 바로, 단발성은 체크박스로. <b>Habit</b>은 별도 카테고리.
                </Note>

                <Note title="카테고리 색상 · muted 파스텔">
                  <div style={{ display: 'flex', gap: 8, marginTop: 8 }}>
                    <Swatch cat="me" label="나" />
                    <Swatch cat="ext" label="외부" />
                    <Swatch cat="habit" label="Habit" />
                  </div>
                </Note>

                <Note title="타이포그래피">
                  <div style={{ fontFamily: JD_DISPLAY, fontSize: 28, fontWeight: 700, letterSpacing: -0.6, color: '#1C1A17' }}>
                    면접 준비 자료 정리
                  </div>
                  <div style={{ fontSize: 13, color: 'rgba(28,26,23,0.58)', marginTop: 4 }}>
                    Apple SD Gothic Neo / SF Pro · 숫자는 tabular-nums
                  </div>
                </Note>

                <Note title="주요 디자인 결정">
                  <ul style={{ margin: '8px 0 0', paddingLeft: 18, lineHeight: 1.65, fontSize: 13, color: 'rgba(28,26,23,0.75)' }}>
                    <li>기간 Task = 옅은 파스텔 배경 + 카테고리 잉크 색 텍스트 (과한 꽉 찬 바 대신)</li>
                    <li>월 표시는 큰 숫자 + "월" 작게 — 타이포 차별화 포인트</li>
                    <li>라이트 모드는 <b>warm off-white</b>, 다크 모드는 <b>soft charcoal</b> (순수 검정 회피)</li>
                    <li>체크박스는 카테고리 색으로 체크되었을 때 채워짐</li>
                    <li>Tab bar는 iOS liquid glass 느낌 · 3개 탭 (홈/통계/설정)</li>
                  </ul>
                </Note>
              </div>
            </DCArtboard>
          </DCSection>

          <DCSection id="home" title="1. 홈 · 캘린더 뷰" subtitle="메인 화면 · 월간 뷰 + 선택 날짜 Task 목록">
            <DCArtboard id="home-light" label="라이트" width={P} height={H}>
              <JDHomeScreen dark={false} />
            </DCArtboard>
            <DCArtboard id="home-dark" label="다크" width={P} height={H}>
              <JDHomeScreen dark={true} />
            </DCArtboard>
          </DCSection>

          <DCSection id="add" title="2. Task 추가 · Bottom Sheet" subtitle="➕ 버튼 → 하단에서 올라옴 · 핵심 필드만">
            <DCArtboard id="add-light" label="라이트" width={P} height={H}>
              <JDBottomSheet dark={false} />
            </DCArtboard>
            <DCArtboard id="add-dark" label="다크" width={P} height={H}>
              <JDBottomSheet dark={true} />
            </DCArtboard>
          </DCSection>

          <DCSection id="detail" title="3. Task 추가 · 전체화면" subtitle="Bottom Sheet를 위로 드래그한 상세 설정">
            <DCArtboard id="detail-light" label="라이트" width={P} height={H}>
              <JDDetailScreen dark={false} />
            </DCArtboard>
            <DCArtboard id="detail-dark" label="다크" width={P} height={H}>
              <JDDetailScreen dark={true} />
            </DCArtboard>
          </DCSection>

          <DCSection id="stats" title="4. 통계 탭" subtitle="월간 리포트 · 카테고리 완료율 · 습관 스트릭">
            <DCArtboard id="stats-light" label="라이트" width={P} height={H}>
              <JDStatsScreen dark={false} />
            </DCArtboard>
            <DCArtboard id="stats-dark" label="다크" width={P} height={H}>
              <JDStatsScreen dark={true} />
            </DCArtboard>
          </DCSection>

          <DCSection id="settings" title="5. 설정 탭" subtitle="계정 · 알림 · 카테고리 · 디스플레이 · 구독 · 데이터 · 앱 정보">
            <DCArtboard id="settings-light" label="라이트" width={P} height={H}>
              <JDSettingsScreen dark={false} />
            </DCArtboard>
            <DCArtboard id="settings-dark" label="다크" width={P} height={H}>
              <JDSettingsScreen dark={true} />
            </DCArtboard>
          </DCSection>

          <DCSection id="widgets" title="6. iOS 위젯 3종" subtitle="아이폰 홈스크린 배경 위에 얹은 모습 · 소 / 중 / 대">
            <DCArtboard id="w-small-light" label="소 · 라이트" width={260} height={360}>
              <JDWidgetOnHome size="small" dark={false} />
            </DCArtboard>
            <DCArtboard id="w-small-dark" label="소 · 다크" width={260} height={360}>
              <JDWidgetOnHome size="small" dark={true} />
            </DCArtboard>
            <DCArtboard id="w-medium-light" label="중 · 라이트" width={330} height={240}>
              <JDWidgetOnHome size="medium" dark={false} />
            </DCArtboard>
            <DCArtboard id="w-medium-dark" label="중 · 다크" width={330} height={240}>
              <JDWidgetOnHome size="medium" dark={true} />
            </DCArtboard>
            <DCArtboard id="w-large-light" label="대 · 라이트" width={330} height={420}>
              <JDWidgetOnHome size="large" dark={false} />
            </DCArtboard>
            <DCArtboard id="w-large-dark" label="대 · 다크" width={330} height={420}>
              <JDWidgetOnHome size="large" dark={true} />
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    function Note({ title, children }) {
      return (
        <div style={{ marginBottom: 18, paddingBottom: 16, borderBottom: '0.5px solid rgba(28,26,23,0.1)' }}>
          <div style={{ fontSize: 11, fontWeight: 700, color: 'rgba(28,26,23,0.48)', letterSpacing: 0.4, textTransform: 'uppercase', marginBottom: 6 }}>{title}</div>
          <div style={{ fontSize: 14, color: '#1C1A17', lineHeight: 1.55 }}>{children}</div>
        </div>
      );
    }

    function Swatch({ cat, label }) {
      const c = JD_TOKENS.light[cat];
      return (
        <div style={{ flex: 1 }}>
          <div style={{ height: 44, borderRadius: 8, background: c.soft, position: 'relative', overflow: 'hidden' }}>
            <div style={{ position: 'absolute', bottom: 6, left: 8, width: 10, height: 10, borderRadius: 5, background: c.solid }} />
          </div>
          <div style={{ fontSize: 11, fontWeight: 600, color: c.ink, marginTop: 5 }}>[{label}]</div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
