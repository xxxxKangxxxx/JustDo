<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>Just Do — Prototype</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    html, body { margin: 0; padding: 0; min-height: 100%; background: #ECE9E2; font-family: -apple-system, "Apple SD Gothic Neo", "Pretendard", system-ui, sans-serif; }
    * { box-sizing: border-box; }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    @keyframes slideRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
    .stage *::-webkit-scrollbar { display: none; }
    .stage * { scrollbar-width: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="styles/tokens.jsx"></script>
  <script type="text/babel" src="styles/primitives.jsx"></script>
  <script type="text/babel" src="proto/store.jsx"></script>
  <script type="text/babel" src="proto/tabbar.jsx"></script>
  <script type="text/babel" src="proto/home.jsx"></script>
  <script type="text/babel" src="proto/sheet-detail.jsx"></script>
  <script type="text/babel" src="proto/stats-settings.jsx"></script>
  <script type="text/babel" src="proto/app.jsx"></script>

  <script type="text/babel">
    function Root() {
      return (
        <div style={{
          minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center',
          padding: 40,
          background: 'radial-gradient(ellipse at top, #F4F1EA 0%, #E8E4DB 100%)',
        }}>
          <div className="stage">
            <StoreProvider>
              <PApp />
            </StoreProvider>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
  </script>
</body>
</html>
