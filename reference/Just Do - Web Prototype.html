<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Just Do — Web</title>
<style>
  html, body, #root { margin: 0; padding: 0; height: 100%; }
  body { background: #F6F4EF; color: #1C1A17; -webkit-font-smoothing: antialiased; font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "SF Pro Display", "Pretendard", "Noto Sans KR", system-ui, sans-serif; overflow: hidden; }
  * { box-sizing: border-box; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: rgba(30,25,20,0.18); border-radius: 6px; border: 2px solid transparent; background-clip: padding-box; }
  ::-webkit-scrollbar-track { background: transparent; }
  button { font-family: inherit; }
  input, select, textarea { font-family: inherit; }
  input[type="date"], input[type="time"] { color-scheme: light; }
  input::placeholder { color: rgba(28,26,23,0.36); }
</style>
</head>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
